sonar.projectKey=symonbaikov_lumio
sonar.organization=symonbaikov

# Sources
sonar.sources=backend/src,frontend/app,frontend/components
sonar.tests=backend/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.e2e-spec.ts

# Coverage
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.next/**,\
  **/coverage/**,\
  **/migrations/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.e2e-spec.ts,\
  **/storybook-static/**

sonar.cpd.exclusions=**/migrations/**
