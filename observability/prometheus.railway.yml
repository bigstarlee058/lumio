global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: lumio-backend
    metrics_path: /api/v1/metrics
    authorization:
      type: Bearer
      credentials: "${METRICS_AUTH_TOKEN}"
    static_configs:
      - targets: ["${BACKEND_METRICS_TARGET}"]
