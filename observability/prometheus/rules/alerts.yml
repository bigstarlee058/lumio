groups:
  - name: lumio-critical
    rules:
      - alert: BackendDown
        expr: up{job="lumio-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend is unreachable for >2 minutes"

      - alert: HighErrorRate
        expr: >
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(http_requests_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "5xx error rate above 5% ({{ $value | humanizePercentage }})"

      - alert: HighLatency
        expr: >
          histogram_quantile(0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency above 2s ({{ $value | humanize }}s)"

      - alert: HighDbPoolUtilization
        expr: >
          db_pool_active_connections
          /
          (db_pool_active_connections + db_pool_idle_connections)
          > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool >90% utilized"

      - alert: AiParsingHighFailureRate
        expr: >
          sum(rate(ai_parsing_calls_total{result="error"}[10m]))
          /
          sum(rate(ai_parsing_calls_total[10m]))
          > 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "AI parsing failure rate above 30% ({{ $value | humanizePercentage }})"
